name: wheels

# Pushing a v* tag builds the wheels and sdist and publishes them to PyPI.
# One abi3-py39 wheel per platform covers Python 3.9 through 3.13+.
# Publishing uses PyPI trusted publishing (OIDC), so there is no stored token.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions: {}

jobs:
  wheels:
    name: wheel ${{ matrix.platform.target }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest      # Linux x86_64
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm   # Linux ARM64 (native runner)
            target: aarch64-unknown-linux-gnu
          - runner: macos-14           # macOS ARM64 (Apple Silicon)
            target: aarch64-apple-darwin
          - runner: windows-latest     # Windows x86_64
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --manifest-path crates/drishti-ffi-python/Cargo.toml
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.target }}
          path: dist

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path crates/drishti-ffi-python/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  publish-pypi:
    name: publish to PyPI
    needs: [wheels, sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # Trusted publishing: the PyPI project must authorize this repo, workflow,
    # and environment. See RELEASING.md.
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "*"
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
